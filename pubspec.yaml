name: image_resizer
description: Offline-first image compression and resizing utility by Livinlabs.
publish_to: 'none'
version: 2.1.0+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  flutter_image_compress: ^2.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  share_plus: ^12.0.1
  google_fonts: ^8.0.2
  gap: ^3.0.1
  image_size_getter: ^2.4.1
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.0
  shared_preferences: ^2.3.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  change_app_package_name: ^1.5.0
  in_app_update: ^4.2.5
  in_app_review: ^2.0.11
  url_launcher: ^6.3.0
  package_info_plus: ^9.0.1
  gal: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  heif_converter: ^1.0.5
  file_picker: ^11.0.2
  image: ^4.8.0
  native_exif: ^0.8.0
  animated_emoji: ^3.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_foreground_inset: 12
  adaptive_icon_background: "#06C974"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_monochrome: "assets/icon.png"

flutter_native_splash:
  color: "#06C974" 
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    color: "#06C974"  

name: pixel_forge
description: Offline-first image compression and resizing utility by Livinlabs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_image_compress: ^2.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  google_fonts: ^6.2.1
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
